name: Build Quantum Engine 2D
on:
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Crear proyecto WPF y agregar paquetes
        run: |
          dotnet new wpf -n QuantumEditor -o QuantumEditor --framework net8.0
          cd QuantumEditor
          dotnet add package MoonSharp --version 2.0.0.0
          dotnet add package SkiaSharp --version 2.88.6
          dotnet add package SkiaSharp.Views.WPF --version 2.88.6
          dotnet add package AvalonEdit --version 6.3.0.90
          dotnet add package AvalonDock --version 4.72.0
        shell: pwsh
      - name: Habilitar WindowsForms
        run: |
          cd QuantumEditor
          $csproj = Get-Content QuantumEditor.csproj -Raw
          if ($csproj -notmatch 'UseWindowsForms') {
              $csproj = $csproj -replace '</PropertyGroup>', "    <UseWindowsForms>true</UseWindowsForms>`r`n  </PropertyGroup>"
              Set-Content QuantumEditor.csproj $csproj -NoNewline
          }
        shell: pwsh
      - name: Decodificar archivos fuente
        run: |
          # App.xaml
          [System.IO.File]::WriteAllBytes("QuantumEditor\App.xaml", [System.Convert]::FromBase64String(""))
          # App.xaml.cs
          [System.IO.File]::WriteAllBytes("QuantumEditor\App.xaml.cs", [System.Convert]::FromBase64String("dXNpbmcgU3lzdGVtLldpbmRvd3M7DQpuYW1lc3BhY2UgUXVhbnR1bUVkaXRvciB7IHB1YmxpYyBwYXJ0aWFsIGNsYXNzIEFwcCA6IEFwcGxpY2F0aW9uIHsgfSB9"))
          # MainWindow.xaml
          [System.IO.File]::WriteAllBytes("QuantumEditor\MainWindow.xaml", [System.Convert]::FromBase64String(""))
          # MainWindow.xaml.cs (código completo del editor)
          [System.IO.File]::WriteAllBytes("QuantumEditor\MainWindow.xaml.cs", [System.Convert]::FromBase64String(""))
        shell: pwsh

      - name: Compilar
        run: |
          cd QuantumEditor
          dotnet restore
          dotnet build -c Release -o ../dist
        shell: pwsh

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Quantum-Engine
          path: dist/
