name: Build Quantum Engine 2D

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear proyecto WPF
        run: dotnet new wpf -n QuantumEditor -o QuantumEditor --framework net8.0
        shell: pwsh

      - name: Agregar paquetes NuGet
        run: |
          cd QuantumEditor
          dotnet add package MoonSharp --version 2.0.0.0
          dotnet add package SkiaSharp --version 2.88.6
          dotnet add package SkiaSharp.Views.WPF --version 2.88.6
          dotnet add package AvalonEdit --version 6.3.0.90
          dotnet add package AvalonDock --version 4.72.0
        shell: pwsh

      - name: Habilitar WindowsForms
        run: |
          cd QuantumEditor
          $csproj = Get-Content QuantumEditor.csproj -Raw
          if ($csproj -notmatch 'UseWindowsForms') {
              $csproj = $csproj -replace '</PropertyGroup>', "    <UseWindowsForms>true</UseWindowsForms>`r`n  </PropertyGroup>"
              Set-Content QuantumEditor.csproj $csproj -NoNewline
          }
        shell: pwsh

      - name: Generar código fuente del editor
        run: |
          # App.xaml
          @'
          <Application x:Class="QuantumEditor.App"
                       xmlns="http://schemas.microsoft.com/winfx/2006/xaml/presentation"
                       xmlns:x="http://schemas.microsoft.com/winfx/2006/xaml"
                       StartupUri="MainWindow.xaml">
              <Application.Resources>
                  <SolidColorBrush x:Key="BackgroundDark" Color="#FF1E1E1E"/>
                  <SolidColorBrush x:Key="PanelDark" Color="#FF2D2D2D"/>
                  <SolidColorBrush x:Key="ForegroundLight" Color="#FFDCDCDC"/>
                  <SolidColorBrush x:Key="AccentColor" Color="#FF007ACC"/>
              </Application.Resources>
          </Application>
          '@ | Set-Content QuantumEditor\App.xaml -Encoding UTF8

          # App.xaml.cs
          @'
          using System.Windows;
          namespace QuantumEditor { public partial class App : Application { } }
          '@ | Set-Content QuantumEditor\App.xaml.cs -Encoding UTF8

          # MainWindow.xaml
          @'
          <Window x:Class="QuantumEditor.MainWindow"
                  xmlns="http://schemas.microsoft.com/winfx/2006/xaml/presentation"
                  xmlns:x="http://schemas.microsoft.com/winfx/2006/xaml"
                  xmlns:avalonDock="https://github.com/Dirkster99/AvalonDock"
                  xmlns:skia="clr-namespace:SkiaSharp.Views.WPF;assembly=SkiaSharp.Views.WPF"
                  xmlns:avalonedit="http://icsharpcode.net/sharpdevelop/avalonedit"
                  Title="Quantum Engine 2D" Height="800" Width="1200"
                  Background="{StaticResource BackgroundDark}">
              <Grid>
                  <Grid.RowDefinitions>
                      <RowDefinition Height="Auto"/>
                      <RowDefinition Height="*"/>
                  </Grid.RowDefinitions>
                  <Menu Grid.Row="0" Background="{StaticResource PanelDark}" Foreground="{StaticResource ForegroundLight}">
                      <MenuItem Header="_Archivo">
                          <MenuItem Header="_Nuevo proyecto..." Click="NewProject_Click"/>
                          <MenuItem Header="_Abrir proyecto..." Click="OpenProject_Click"/>
                          <Separator/>
                          <MenuItem Header="_Exportar a .exe" Click="ExportProject_Click"/>
                          <Separator/>
                          <MenuItem Header="_Salir" Click="Exit_Click"/>
                      </MenuItem>
                      <MenuItem Header="_Editar">
                          <MenuItem Header="_Deshacer" Click="Undo_Click"/>
                          <MenuItem Header="_Rehacer" Click="Redo_Click"/>
                      </MenuItem>
                  </Menu>
                  <avalonDock:DockingManager Grid.Row="1" x:Name="DockManager"
                                            AllowMixedOrientation="True" BorderThickness="0"
                                            Background="{StaticResource BackgroundDark}">
                      <avalonDock:DockingManager.Theme>
                          <avalonDock:Vs2013DarkTheme/>
                      </avalonDock:DockingManager.Theme>
                      <avalonDock:LayoutRoot>
                          <avalonDock:LayoutPanel Orientation="Horizontal">
                              <avalonDock:LayoutAnchorablePane DockWidth="250">
                                  <avalonDock:LayoutAnchorable Title="Explorador" CanClose="False" CanAutoHide="False">
                                      <TreeView x:Name="ExplorerTree" Background="{StaticResource BackgroundDark}"
                                                Foreground="{StaticResource ForegroundLight}" BorderThickness="0"
                                                SelectedItemChanged="ExplorerTree_SelectedItemChanged"/>
                                  </avalonDock:LayoutAnchorable>
                              </avalonDock:LayoutAnchorablePane>
                              <avalonDock:LayoutDocumentPane>
                                  <avalonDock:LayoutDocument Title="Escena" CanClose="False">
                                      <Grid Background="{StaticResource BackgroundDark}">
                                          <Grid.RowDefinitions>
                                              <RowDefinition Height="Auto"/>
                                              <RowDefinition Height="*"/>
                                          </Grid.RowDefinitions>
                                          <ToolBar Grid.Row="0" Background="{StaticResource PanelDark}">
                                              <Button Content="Mover" Click="Tool_Move_Click"/>
                                              <Button Content="Rotar" Click="Tool_Rotate_Click"/>
                                              <Button Content="Escalar" Click="Tool_Scale_Click"/>
                                              <Separator/>
                                              <Button Content="▶ Play" Click="Play_Click"/>
                                              <Button Content="■ Stop" Click="Stop_Click"/>
                                              <Separator/>
                                              <CheckBox Content="Bloquear selección" Click="LockSelection_Click"
                                                        Foreground="{StaticResource ForegroundLight}" VerticalAlignment="Center"/>
                                              <Separator/>
                                              <Button Content="Añadir Sprite" Click="AddSprite_Click"/>
                                          </ToolBar>
                                          <skia:SKElement Grid.Row="1" x:Name="ViewportElement"
                                                          PaintSurface="OnPaintSurface"
                                                          MouseDown="OnViewportMouseDown"
                                                          MouseMove="OnViewportMouseMove"
                                                          MouseUp="OnViewportMouseUp"
                                                          ClipToBounds="True"/>
                                      </Grid>
                                  </avalonDock:LayoutDocument>
                              </avalonDock:LayoutDocumentPane>
                              <avalonDock:LayoutAnchorablePane DockWidth="300">
                                  <avalonDock:LayoutAnchorable Title="Inspector" CanClose="False" CanAutoHide="False">
                                      <WindowsFormsHost x:Name="InspectorHost"/>
                                  </avalonDock:LayoutAnchorable>
                                  <avalonDock:LayoutAnchorable Title="Script Lua" CanClose="False" CanAutoHide="False">
                                      <avalonedit:TextEditor x:Name="ScriptEditor" FontFamily="Consolas" FontSize="12"
                                                             Background="#FF1E1E1E" Foreground="#FFDCDCDC" BorderThickness="0"
                                                             SyntaxHighlighting="Lua"/>
                                  </avalonDock:LayoutAnchorable>
                              </avalonDock:LayoutAnchorablePane>
                          </avalonDock:LayoutPanel>
                      </avalonDock:LayoutRoot>
                  </avalonDock:DockingManager>
              </Grid>
          </Window>
          '@ | Set-Content QuantumEditor\MainWindow.xaml -Encoding UTF8

          # MainWindow.xaml.cs (código completo del editor)
          @'
          using System;
          using System.Collections.Generic;
          using System.ComponentModel;
          using System.Drawing;
          using System.IO;
          using System.Linq;
          using System.Reflection;
          using System.Windows;
          using System.Windows.Controls;
          using System.Windows.Input;
          using System.Windows.Media;
          using System.Windows.Forms;
          using System.Windows.Forms.Integration;
          using ICSharpCode.AvalonEdit;
          using ICSharpCode.AvalonEdit.Highlighting;
          using MoonSharp.Interpreter;
          using SkiaSharp;
          using SkiaSharp.Views.Desktop;
          using SkiaSharp.Views.WPF;

          namespace QuantumEditor
          {
              public partial class MainWindow : Window
              {
                  private EditorScene scene = new EditorScene();
                  private TransformTool currentTool = TransformTool.Move;
                  private bool selectionLocked = false;
                  private EditorGameObject selectedObject;
                  private SKPoint lastMousePos;
                  private bool isDragging = false;
                  private SKPoint dragStart;
                  private GamePlayerWindow gameWindow;
                  private PropertyGrid inspectorGrid;

                  public MainWindow()
                  {
                      InitializeComponent();

                      inspectorGrid = new PropertyGrid { Dock = DockStyle.Fill, PropertySort = PropertySort.Alphabetical };
                      InspectorHost.Child = inspectorGrid;
                      inspectorGrid.PropertyValueChanged += OnPropertyValueChanged;

                      ScriptEditor.SyntaxHighlighting = HighlightingManager.Instance.GetDefinition("Lua");
                      ScriptEditor.TextChanged += (s, e) =>
                      {
                          if (selectedObject != null) selectedObject.LuaScript = ScriptEditor.Text;
                      };

                      UpdateExplorer();
                      ViewportElement.InvalidateVisual();
                  }

                  private void NewProject_Click(object sender, RoutedEventArgs e) { /* implementación pendiente */ }
                  private void OpenProject_Click(object sender, RoutedEventArgs e) { }
                  private void ExportProject_Click(object sender, RoutedEventArgs e) { }
                  private void Exit_Click(object sender, RoutedEventArgs e) => Close();
                  private void Undo_Click(object sender, RoutedEventArgs e) { }
                  private void Redo_Click(object sender, RoutedEventArgs e) { }

                  private void ExplorerTree_SelectedItemChanged(object sender, RoutedPropertyChangedEventArgs<object> e)
                  {
                      if (e.NewValue is TreeViewItem item && item.Tag is EditorGameObject obj)
                          SelectObject(obj);
                  }

                  private void SelectObject(EditorGameObject obj)
                  {
                      selectedObject = obj;
                      inspectorGrid.SelectedObject = new GameObjectPropertyWrapper(obj);
                      ScriptEditor.Text = obj.LuaScript ?? "";
                      ViewportElement.InvalidateVisual();
                  }

                  private void OnPropertyValueChanged(object s, PropertyValueChangedEventArgs e)
                  {
                      ViewportElement.InvalidateVisual();
                      if (e.ChangedItem.Label == "Name") UpdateExplorer();
                  }

                  private void Tool_Move_Click(object sender, RoutedEventArgs e) => currentTool = TransformTool.Move;
                  private void Tool_Rotate_Click(object sender, RoutedEventArgs e) => currentTool = TransformTool.Rotate;
                  private void Tool_Scale_Click(object sender, RoutedEventArgs e) => currentTool = TransformTool.Scale;
                  private void LockSelection_Click(object sender, RoutedEventArgs e)
                  {
                      selectionLocked = (e.Source as System.Windows.Controls.CheckBox)?.IsChecked ?? false;
                  }

                  private void Play_Click(object sender, RoutedEventArgs e)
                  {
                      if (gameWindow != null) return;
                      gameWindow = new GamePlayerWindow(scene);
                      gameWindow.Closed += (s, ev) => gameWindow = null;
                      gameWindow.Show();
                  }
                  private void Stop_Click(object sender, RoutedEventArgs e) => gameWindow?.Close();

                  private void AddSprite_Click(object sender, RoutedEventArgs e)
                  {
                      var obj = new EditorGameObject
                      {
                          Name = "Sprite" + (scene.Objects.Count + 1),
                          X = 100 + scene.Objects.Count * 30,
                          Y = 100,
                          W = 100,
                          H = 100
                      };
                      scene.Objects.Add(obj);
                      UpdateExplorer();
                      ViewportElement.InvalidateVisual();
                  }

                  private void OnPaintSurface(object sender, SKPaintSurfaceEventArgs e)
                  {
                      var canvas = e.Surface.Canvas;
                      canvas.Clear(SKColors.DarkSlateGray);
                      using var gridPaint = new SKPaint { Color = SKColors.White.WithAlpha(30) };
                      for (int x = 0; x < e.Info.Width; x += 50) canvas.DrawLine(x, 0, x, e.Info.Height, gridPaint);
                      for (int y = 0; y < e.Info.Height; y += 50) canvas.DrawLine(0, y, e.Info.Width, y, gridPaint);
                      foreach (var obj in scene.Objects)
                      {
                          obj.Render(canvas);
                          if (obj == selectedObject)
                          {
                              using var selPaint = new SKPaint { Style = SKPaintStyle.Stroke, Color = SKColors.Yellow, StrokeWidth = 2 };
                              canvas.DrawRect(obj.X, obj.Y, obj.W, obj.H, selPaint);
                          }
                      }
                  }

                  private void OnViewportMouseDown(object sender, MouseButtonEventArgs e)
                  {
                      var pos = e.GetPosition(ViewportElement);
                      var skPoint = new SKPoint((float)pos.X, (float)pos.Y);
                      lastMousePos = skPoint;
                      dragStart = skPoint;
                      if (!selectionLocked && e.LeftButton == MouseButtonState.Pressed)
                      {
                          var hit = scene.Objects.LastOrDefault(o => new SKRect(o.X, o.Y, o.X + o.W, o.Y + o.H).Contains(skPoint));
                          if (hit != null)
                          {
                              SelectObject(hit);
                              isDragging = true;
                              ViewportElement.CaptureMouse();
                          }
                          else
                          {
                              selectedObject = null;
                              inspectorGrid.SelectedObject = null;
                              ViewportElement.InvalidateVisual();
                          }
                      }
                  }

                  private void OnViewportMouseMove(object sender, MouseEventArgs e)
                  {
                      if (!isDragging || selectedObject == null) return;
                      var pos = e.GetPosition(ViewportElement);
                      var cur = new SKPoint((float)pos.X, (float)pos.Y);
                      float dx = cur.X - lastMousePos.X;
                      float dy = cur.Y - lastMousePos.Y;
                      lastMousePos = cur;
                      switch (currentTool)
                      {
                          case TransformTool.Move:
                              selectedObject.X += dx;
                              selectedObject.Y += dy;
                              break;
                          case TransformTool.Rotate:
                              var center = new SKPoint(selectedObject.X + selectedObject.W / 2, selectedObject.Y + selectedObject.H / 2);
                              float angle = (float)Math.Atan2(cur.Y - center.Y, cur.X - center.X) -
                                            (float)Math.Atan2(dragStart.Y - center.Y, dragStart.X - center.X);
                              selectedObject.Rotation += angle * (180 / (float)Math.PI);
                              dragStart = cur;
                              break;
                          case TransformTool.Scale:
                              float scaleFactor = 1 + dx / selectedObject.W;
                              selectedObject.W *= scaleFactor;
                              selectedObject.H *= 1 + dy / selectedObject.H;
                              break;
                      }
                      ViewportElement.InvalidateVisual();
                  }

                  private void OnViewportMouseUp(object sender, MouseButtonEventArgs e)
                  {
                      isDragging = false;
                      ViewportElement.ReleaseMouseCapture();
                  }

                  private void UpdateExplorer()
                  {
                      ExplorerTree.Items.Clear();
                      foreach (var obj in scene.Objects)
                      {
                          var item = new TreeViewItem { Header = obj.Name, Tag = obj };
                          item.ContextMenu = new System.Windows.Controls.ContextMenu();
                          var deleteItem = new System.Windows.Controls.MenuItem { Header = "Eliminar" };
                          deleteItem.Click += (s, e) =>
                          {
                              scene.Objects.Remove(obj);
                              UpdateExplorer();
                              ViewportElement.InvalidateVisual();
                          };
                          item.ContextMenu.Items.Add(deleteItem);
                          ExplorerTree.Items.Add(item);
                      }
                  }

                  enum TransformTool { Move, Rotate, Scale }
              }

              public class EditorScene
              {
                  public List<EditorGameObject> Objects { get; set; } = new List<EditorGameObject>();
              }

              public class EditorGameObject
              {
                  public string Name { get; set; } = "Object";
                  public float X { get; set; }
                  public float Y { get; set; }
                  public float W { get; set; } = 100;
                  public float H { get; set; } = 100;
                  public float Rotation { get; set; }
                  public string SpriteFile { get; set; }
                  public string LuaScript { get; set; }

                  public void Render(SKCanvas canvas)
                  {
                      using var paint = new SKPaint { Color = SKColors.CornflowerBlue };
                      canvas.DrawRect(X, Y, W, H, paint);
                      using var outline = new SKPaint { Style = SKPaintStyle.Stroke, Color = SKColors.Black };
                      canvas.DrawRect(X, Y, W, H, outline);
                  }
              }

              public class GameObjectPropertyWrapper
              {
                  private EditorGameObject obj;
                  public GameObjectPropertyWrapper(EditorGameObject obj) { this.obj = obj; }

                  [Category("Transform")]
                  public string Name { get => obj.Name; set => obj.Name = value; }
                  [Category("Transform")]
                  public float X { get => obj.X; set => obj.X = value; }
                  [Category("Transform")]
                  public float Y { get => obj.Y; set => obj.Y = value; }
                  [Category("Transform")]
                  public float Width { get => obj.W; set => obj.W = value; }
                  [Category("Transform")]
                  public float Height { get => obj.H; set => obj.H = value; }
                  [Category("Transform")]
                  public float Rotation { get => obj.Rotation; set => obj.Rotation = value; }
                  [Category("Graphics")]
                  public string Sprite { get => obj.SpriteFile; set => obj.SpriteFile = value; }
              }

              public class GamePlayerWindow : Form
              {
                  public GamePlayerWindow(EditorScene scene)
                  {
                      Text = "Quantum Player";
                      DoubleBuffered = true;
                      // Implementación futura
                  }
              }
          }
          '@ | Set-Content QuantumEditor\MainWindow.xaml.cs -Encoding UTF8
        shell: pwsh

      - name: Compilar
        run: |
          cd QuantumEditor
          dotnet restore
          dotnet build -c Release -o ../dist
        shell: pwsh

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Quantum-Engine
          path: dist/
